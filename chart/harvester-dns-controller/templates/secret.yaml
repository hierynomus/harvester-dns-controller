{{- if not .Values.dns.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "harvester-dns-controller.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harvester-dns-controller.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.dns.password | required "dns.password or dns.existingSecret is required" | quote }}
{{- end }}
