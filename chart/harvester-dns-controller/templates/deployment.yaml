apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "routeros-dns-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "routeros-dns-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "routeros-dns-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "routeros-dns-operator.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rollout when the ConfigMap or Secret changes
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "routeros-dns-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: ROUTEROS_HOST
              value: {{ .Values.routeros.host | quote }}
            - name: ROUTEROS_USERNAME
              value: {{ .Values.routeros.username | quote }}
            - name: ROUTEROS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.routeros.existingSecret }}{{ .Values.routeros.existingSecret }}{{ else }}{{ include "routeros-dns-operator.fullname" . }}-credentials{{ end }}
                  key: password
            - name: ROUTEROS_USE_TLS
              value: {{ .Values.routeros.useTls | quote }}
            - name: ROUTEROS_TLS_VERIFY
              value: {{ .Values.routeros.tlsVerify | quote }}
            - name: DNS_DOMAIN
              value: {{ .Values.dns.domain | quote }}
            - name: DNS_TTL
              value: {{ .Values.dns.ttl | quote }}
            - name: DNS_COMMENT_TAG
              value: {{ .Values.dns.commentTag | quote }}
            - name: HEALTH_PORT
              value: {{ .Values.healthPort | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: WATCH_NAMESPACES
              value: {{ .Values.watchNamespaces | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
