---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "harvester-dns-controller.fullname" . }}
  labels:
    {{- include "harvester-dns-controller.labels" . | nindent 4 }}
rules:
  # VirtualMachineNetworkConfigs: watch for changes, patch finalizers
  - apiGroups: ["network.harvesterhci.io"]
    resources: ["virtualmachinenetworkconfigs"]
    verbs: ["get", "list", "watch", "patch", "update"]
  {{- if .Values.dns.useGuestClusterLabel }}
  # VirtualMachines: read labels for hostname derivation (only when useGuestClusterLabel is enabled)
  - apiGroups: ["kubevirt.io"]
    resources: ["virtualmachines"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  # LoadBalancers: watch for changes, patch finalizers
  - apiGroups: ["loadbalancer.harvesterhci.io"]
    resources: ["loadbalancers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "harvester-dns-controller.fullname" . }}
  labels:
    {{- include "harvester-dns-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "harvester-dns-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "harvester-dns-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
